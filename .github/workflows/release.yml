name: Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # No inline release-type: an inline type makes the action ignore
      # release-please-config.json, whose bump-minor-pre-major flag is what
      # keeps a pre-1.0 breaking change at 0.x+1.0 instead of 1.0.0.
      # (The action reads both files via the GitHub API — no checkout needed.)
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  npm-publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test:coverage

      - run: npm run build

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
